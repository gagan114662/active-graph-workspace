name: pullfrog
# #20 wiring. Pullfrog-style GitHub bot that uses the operator's
# Claude Code subscription (no API key). Runs on a self-hosted runner
# on the operator's Mac so it inherits the local `claude` CLI keychain
# auth.
#
# Setup (one-time, operator):
#   1. GitHub repo Settings -> Actions -> Runners -> New self-hosted runner
#   2. Download + register the runner on the Mac (follow GitHub's
#      copy-pasteable instructions; label it `claude-code-mac`).
#   3. Make sure the runner service user can:
#      - Run `claude -p` and get a real response (run `claude auth login`
#        once interactively to confirm).
#      - Read this repo at the configured workspace path.
#   4. Enable Actions in repo settings.
#
# Trigger:
#   - Comment `@pullfrog <prompt>` on any issue or PR.
#   - Pullfrog posts the response as a follow-up comment.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  pullfrog-respond:
    if: |
      contains(github.event.comment.body, '@pullfrog') &&
      github.event.sender.type != 'Bot'
    runs-on: [self-hosted, claude-code-mac]
    permissions:
      issues: write
      pull-requests: write
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: dispatch via claude
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PROMPT=$(printf '%s' "$COMMENT_BODY" | sed -e 's/@pullfrog//g')
          CONTEXT=$(printf '## recent commits\n\n%s\n\n## issue or PR body\n\n%s' \
            "$(git log --oneline -50)" \
            "$(gh issue view "$ISSUE_NUMBER" --repo "$REPO" --json body --jq .body 2>/dev/null || gh pr view "$ISSUE_NUMBER" --repo "$REPO" --json body --jq .body)")
          unset CLAUDECODE CLAUDE_CODE_ENTRYPOINT CLAUDE_CODE_EXECPATH AI_AGENT
          # Absolute paths because launchd's PATH doesn't include the
          # operator's $HOME/.local/bin and $HOME/.bun/bin where the
          # CLIs live for interactive shells.
          CLAUDE="$HOME/.local/bin/claude"
          if [ ! -x "$CLAUDE" ]; then CLAUDE=$(command -v claude || echo claude); fi
          RESPONSE=$(printf '%s\n\n--- context ---\n%s\n' "$PROMPT" "$CONTEXT" | \
            "$CLAUDE" -p \
              --output-format text \
              --dangerously-skip-permissions \
              --model claude-opus-4-7 \
              --add-dir "$GITHUB_WORKSPACE" \
              2>&1 || echo "(claude exited with error; check runner logs)")
          if [ -z "$RESPONSE" ]; then RESPONSE="(claude returned empty output — check runner logs at ~/Library/Logs/actions.runner.gagan114662-active-graph-workspace.claude-code-mac/)"; fi
          gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "$RESPONSE"
